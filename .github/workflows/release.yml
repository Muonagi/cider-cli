name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: impactor
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: impactor
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: impactor
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: impactor.exe
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libusb-1.0-0-dev

      - name: Build release
        run: cargo build -p impactor --release --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a ../../../impactor-${{ matrix.target }}.zip ${{ matrix.artifact }}
          else
            tar czf ../../../impactor-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: impactor-${{ matrix.target }}
          path: |
            impactor-${{ matrix.target }}.tar.gz
            impactor-${{ matrix.target }}.zip
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
