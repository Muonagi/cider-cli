name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: cider
          - os: macos-15
            target: x86_64-apple-darwin
            artifact: cider
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: cider
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: cider.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libusb-1.0-0-dev

      - name: Build release
        run: cargo build -p cider --release --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a ../../../cider-${{ matrix.target }}.zip ${{ matrix.artifact }}
          else
            tar czf ../../../cider-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cider-${{ matrix.target }}
          path: |
            cider-${{ matrix.target }}.tar.gz
            cider-${{ matrix.target }}.zip
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*

  homebrew:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Update formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"

          SHA_ARM64=$(sha256sum artifacts/cider-aarch64-apple-darwin.tar.gz | awk '{print $1}')
          SHA_X86_64=$(sha256sum artifacts/cider-x86_64-apple-darwin.tar.gz | awk '{print $1}')
          SHA_LINUX=$(sha256sum artifacts/cider-x86_64-unknown-linux-gnu.tar.gz | awk '{print $1}')

          # Clone the tap repo
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/Muonagi/homebrew-cider.git" tap

          # Generate the formula
          cat > tap/Formula/cider.rb << 'FORMULA'
          class Cider < Formula
            desc "CLI tool for signing and sideloading iOS apps"
            homepage "https://github.com/Muonagi/cider-cli"
            version "VERSION_PLACEHOLDER"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/Muonagi/cider-cli/releases/download/vVERSION_PLACEHOLDER/cider-aarch64-apple-darwin.tar.gz"
                sha256 "SHA_ARM64_PLACEHOLDER"
              else
                url "https://github.com/Muonagi/cider-cli/releases/download/vVERSION_PLACEHOLDER/cider-x86_64-apple-darwin.tar.gz"
                sha256 "SHA_X86_64_PLACEHOLDER"
              end
            end

            on_linux do
              url "https://github.com/Muonagi/cider-cli/releases/download/vVERSION_PLACEHOLDER/cider-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "SHA_LINUX_PLACEHOLDER"
            end

            def install
              bin.install "cider"
            end

            test do
              assert_match "cider", shell_output("#{bin}/cider --help")
            end
          end
          FORMULA

          # Replace placeholders
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" tap/Formula/cider.rb
          sed -i "s/SHA_ARM64_PLACEHOLDER/${SHA_ARM64}/g" tap/Formula/cider.rb
          sed -i "s/SHA_X86_64_PLACEHOLDER/${SHA_X86_64}/g" tap/Formula/cider.rb
          sed -i "s/SHA_LINUX_PLACEHOLDER/${SHA_LINUX}/g" tap/Formula/cider.rb

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' tap/Formula/cider.rb

          # Commit and push
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/cider.rb
          git commit -m "Update cider to ${VERSION}"
          git push
